name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  s1-01:
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: 17.0.19+10
      - name: Verify S1-01 package contract
        run: Scripts/verify-s1-01.sh
      - name: Verify guarded Maestro runner
        run: Scripts/test-run-maestro.sh
      - name: Install pinned Maestro CLI
        run: |
          curl -fsSL \
            https://github.com/mobile-dev-inc/Maestro/releases/download/cli-2.6.1/maestro.zip \
            -o "$RUNNER_TEMP/maestro.zip"
          echo "3440825f514f537c6a96bcf5de995780c2a4a7f83a43208fdc95d4f1fecfad3b  $RUNNER_TEMP/maestro.zip" \
            | shasum -a 256 -c -
          unzip -q "$RUNNER_TEMP/maestro.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/maestro/bin" >> "$GITHUB_PATH"
      - name: Run fixture acceptance
        run: |
          THORCHAIN_SIMULATOR_UDID=$(xcrun simctl list devices available -j \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(next(x["udid"] for ds in d["devices"].values() for x in ds if x.get("isAvailable") and x.get("state")=="Shutdown" and x["name"].startswith("iPhone")))')
          export THORCHAIN_SIMULATOR_UDID
          Scripts/run-maestro.sh
